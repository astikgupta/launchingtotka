<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TOTKA • Launching Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8f7f3;
      overflow:hidden;
      font-family:'Montserrat', sans-serif;
      position:relative;
    }

    /* Background Glow */

    body::before{
      content:"";
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle, rgba(11,61,46,0.08) 0%, transparent 70%);
      top:-200px;
      right:-150px;
      z-index:0;
    }

    body::after{
      content:"";
      position:absolute;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(185,148,88,0.08) 0%, transparent 70%);
      bottom:-250px;
      left:-150px;
      z-index:0;
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      max-width:1000px;
      padding:40px 25px;
      animation:fadeIn 1.4s ease;
    }

    /* Logo */

    .symbol{
      font-size:18px;
      color:#0b3d2e;
      letter-spacing:8px;
      margin-bottom:15px;
      opacity:0.8;
    }

    .title{
      font-family:'Montserrat', sans-serif;
      font-size:82px;
      letter-spacing:14px;
      color:#0b3d2e;
      font-weight:700;
      margin-bottom:30px;
    }

    .line{
      width:120px;
      height:1px;
      background:#0b3d2e;
      margin:0 auto 40px;
      opacity:0.4;
    }

    /* Description */

    .description{
      font-family:'Cormorant Garamond', serif;
      font-size:34px;
      line-height:1.6;
      color:#1f2937;
      font-weight:500;
    }

    .highlight{
      background:#eef1dc;
      color:#0b3d2e;
      padding:2px 10px;
      border-radius:8px;
      font-weight:700;
    }

    /* Launching Soon */

    .launching{
      margin-top:70px;
      font-size:32px;
      letter-spacing:12px;
      color:#5d7b72;
      font-weight:600;
      animation:glow 2s infinite alternate;
    }

    .tagline{
      margin-top:20px;
      font-size:18px;
      letter-spacing:5px;
      color:#6b7280;
      text-transform:uppercase;
    }

    /* Animation */

    @keyframes glow{

      from{
        opacity:0.5;
        transform:translateY(0px);
      }

      to{
        opacity:1;
        transform:translateY(-3px);
      }
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0px);
      }
    }

    /* Responsive */

    @media(max-width:768px){

      .title{
        font-size:52px;
        letter-spacing:8px;
      }

      .description{
        font-size:24px;
      }

      .launching{
        font-size:22px;
        letter-spacing:8px;
      }

      .tagline{
        font-size:13px;
        letter-spacing:3px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="symbol">
      ✦ ✦ ✦
    </div>

    <div class="title">
      TOTKA
    </div>

    <div class="line"></div>

    <div class="description">

      A Totka (टोटका) refers to a traditional folk remedy,
      superstitious practice, or 
      <span class="highlight">“life hack”</span>
      meant to 
      <span class="highlight">solve an everyday problem</span>,
      cure an illness, ward off the 
      <span class="highlight">evil eye</span>,
      or bring 
      <span class="highlight">good luck</span>.

    </div>

    <div class="launching">
      LAUNCHING SOON 🚀
    </div>

    <div class="tagline">
      Planetary Wellness • Ayurvedic • Handcrafted
    </div>

  </div>

</body>
</html>
